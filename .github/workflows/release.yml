name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build with PyInstaller
        run: pyinstaller --noconfirm Universal-App-Deployer.spec
      - name: Package Windows Zip
        run: Compress-Archive -Path dist/"Universal Deployer"/* -DestinationPath "Universal-Deployer-Win.zip"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Universal-Deployer-Win.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt
      - name: Build with PyInstaller
        run: pyinstaller --noconfirm Universal-App-Deployer.spec
      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Universal Deployer Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Universal Deployer.app" 150 190 \
            --hide-extension "Universal Deployer.app" \
            --app-drop-link 450 190 \
            "Universal-Deployer-Mac.dmg" \
            "dist/Universal Deployer.app"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: Universal-Deployer-Mac.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Create version metadata
        run: |
          echo "{\"tag_name\": \"${{ github.ref_name }}\", \"date\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}" > version.json
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-build/Universal-Deployer-Win.zip
            macos-build/Universal-Deployer-Mac.dmg
            version.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
